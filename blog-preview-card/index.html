<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Blog preview card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="preview-card">
        <img
          src="./assets/images/illustration-article.svg"
          alt=""
          class="preview-image"
        />
        <div class="preview-categories">
          <div class="preview-category"> Learning </div>
        </div>
        <span class="preview-date"> Published 21 Dec 2023 </span>
        <h1 class="preview-title">HTML & CSS foundations</h1>
        <p class="preview-description">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
        <div class="preview-attribution">
          <img
            src="./assets/images/image-avatar.webp"
            alt=""
            class="preview-avatar"
          />
          <span class="preview-author">Greg Hooper</span>
        </div>
      </div>
    </main>
    <footer>
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by
        <a href="https://github.com/thinotmandresy/">Thinot Mandresy</a>.
      </div>
    </footer>
  </body>
</html>
